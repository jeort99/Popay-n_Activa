<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popayán Activa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(180deg, #f8fafc 0%, #ffffff 45%, #eef2ff 100%);
            min-height: 100vh;
        }
        .navbar-brand {
            font-weight: 700;
        }
        .hero {
            background: linear-gradient(135deg, #2b6cb0, #805ad5);
            color: #fff;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,.08);
        }
        .card-custom {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 20px 40px rgba(0,0,0,.08);
        }
        .status-badge {
            font-size: 0.92rem;
        }
        footer {
            padding: 1.5rem 0;
            color: #64748b;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">Popayán Activa</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="/denuncias/">Denuncias</a></li>
                    <li class="nav-item"><a class="nav-link" href="/denuncias/nueva/">Registrar</a></li>
                    <li class="nav-item"><a class="nav-link" href="/denuncias/mis/">Mis denuncias</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center">
        <div class="container">
            <p class="mb-1">Popayán Activa &copy; 2026</p>
            <small>Gestión de denuncias ciudadanas con tecnología y confianza.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
