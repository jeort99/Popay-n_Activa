{% extends "denuncias/base.html" %}

{% block content %}
<div class="card card-custom p-4 shadow-sm">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h1 class="h3 mb-1">Editar estado de denuncia</h1>
                <p class="text-muted">Cambia el estado de la denuncia para reflejar su avance.</p>
            </div>
            <a href="{% url 'lista_denuncias' %}" class="btn btn-outline-primary">Volver al listado</a>
        </div>

        <div class="mb-4">
            <h5 class="mb-2">{{ denuncia.titulo }}</h5>
            <p class="text-muted mb-0">{{ denuncia.descripcion|truncatechars:140 }}</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" for="estado">Estado</label>
                <select id="estado" name="estado" class="form-select">
                    {% for estado_opcion in estados %}
                        <option value="{{ estado_opcion }}" {% if denuncia.estado == estado_opcion %}selected{% endif %}>{{ estado_opcion }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Guardar estado</button>
        </form>
    </div>
</div>
{% endblock %}
