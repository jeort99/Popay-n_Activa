{% extends "denuncias/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card card-custom p-4 shadow-sm">
            <div class="card-body">
                <h1 class="h3 mb-1">Iniciar sesion</h1>
                <p class="text-muted mb-4">Accede para registrar y consultar tus denuncias.</p>

                <form method="post" novalidate>
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">
                    {{ form.non_field_errors }}
                    <div class="mb-3">
                        <label class="form-label" for="id_username">Correo electronico</label>
                        <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" class="form-control" required id="id_username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="id_password">Contrasena</label>
                        <input type="password" name="password" autocomplete="current-password" class="form-control" required id="id_password">
                    </div>
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                    <a href="{% url 'registro' %}" class="btn btn-link">Crear cuenta</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
