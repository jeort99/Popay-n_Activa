{% extends "denuncias/base.html" %}

{% block content %}
<div class="card card-custom p-4 shadow-sm">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h1 class="h3 mb-1">Registrar nueva denuncia</h1>
                <p class="text-muted">Completa los datos para generar tu reporte y darle seguimiento.</p>
            </div>
            <a href="/denuncias/mis/" class="btn btn-outline-primary">Mis denuncias</a>
        </div>

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label" for="id_categoria">Categoria</label>
                    {{ form.categoria }}
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="id_titulo">Titulo de la denuncia</label>
                    {{ form.titulo }}
                </div>
                <div class="col-12">
                    <label class="form-label" for="id_descripcion">Descripcion</label>
                    {{ form.descripcion }}
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary btn-lg">Enviar denuncia</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
